name: Destroy Segmentado

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 1. Destruir Capa de Computo
        run: |
          aws cloudformation delete-stack --stack-name comp-parcial-1029215-maicol
          aws cloudformation wait stack-delete-complete --stack-name comp-parcial-1029215-maicol

      - name: 2. Destruir Capa de Balanceo
        run: |
          aws cloudformation delete-stack --stack-name alb-parcial-1029215-maicol
          aws cloudformation wait stack-delete-complete --stack-name alb-parcial-1029215-maicol

      - name: 3. Destruir Capa de Seguridad
        run: |
          aws cloudformation delete-stack --stack-name sec-parcial-1029215-maicol
          aws cloudformation wait stack-delete-complete --stack-name sec-parcial-1029215-maicol